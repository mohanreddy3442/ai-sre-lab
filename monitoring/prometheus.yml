global:
  scrape_interval: 15s

rule_files:
  - "/etc/prometheus/alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - "alertmanager:9093"

scrape_configs:
  - job_name: "ai-sre-backend"
    static_configs:
      - targets: ["ai-sre-backend:8000"]

  - job_name: "user-service"
    static_configs:
      - targets: ["user-service:8001"]

  - job_name: "order-service"
    static_configs:
      - targets: ["order-service:8002"]
